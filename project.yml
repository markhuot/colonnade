name: OpenCode
options:
  bundleIdPrefix: ai.opencode
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 15.0
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: ai.opencode.mac
    PRODUCT_NAME: Colonnade
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    INFOPLIST_KEY_CFBundleDisplayName: Colonnade
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
    INFOPLIST_KEY_NSHumanReadableCopyright: Copyright 2026
targets:
  OpenCode:
    type: application
    platform: macOS
    resources:
      - path: OpenCodeMac/TextMateThemes
      - path: OpenCodeMac/Assets.xcassets
    info:
      path: OpenCodeMac/Info.plist
      properties:
        CFBundleDisplayName: Colonnade
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: Copyright 2026
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    sources:
      - path: OpenCodeKit
      - path: OpenCodePersistence
      - path: OpenCodeFeature
      - path: OpenCodeMac
        excludes:
          - PanePersistenceStore.swift
          - SessionStore.swift
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "47P4ZSALX4"
        SWIFT_EMIT_LOC_STRINGS: NO
      configs:
        Debug:
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Developer ID Application
          ENABLE_HARDENED_RUNTIME: YES
    scheme:
      testTargets:
        - OpenCodeTests
  OpenCodeiOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    resources:
      - path: OpenCodeMac/Assets.xcassets
    info:
      path: OpenCodeiOS/Info.plist
      properties:
        CFBundleDisplayName: Colonnade
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
    sources:
      - path: OpenCodeKit
      - path: OpenCodePersistence
      - path: OpenCodeFeature
      - path: OpenCodeiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.opencode.ios
        PRODUCT_NAME: Colonnade
        SUPPORTED_PLATFORMS: iphonesimulator iphoneos
        TARGETED_DEVICE_FAMILY: 1,2
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "47P4ZSALX4"
        SWIFT_EMIT_LOC_STRINGS: NO
    scheme:
      gatherCoverageData: false
  OpenCodeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OpenCodeTests
    dependencies:
      - target: OpenCode
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        PRODUCT_NAME: OpenCodeTests
        PRODUCT_MODULE_NAME: OpenCodeTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Colonnade.app/Contents/MacOS/Colonnade
