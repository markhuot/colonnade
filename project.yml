name: OpenCode
options:
  bundleIdPrefix: ai.opencode
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 15.0
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: ai.opencode.mac
    PRODUCT_NAME: OpenCode
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    INFOPLIST_KEY_CFBundleDisplayName: OpenCode
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
    INFOPLIST_KEY_NSHumanReadableCopyright: Copyright 2026
packages:
  Textual:
    url: https://github.com/gonzalezreal/textual
    from: 0.1.0
targets:
  OpenCode:
    type: application
    platform: macOS
    resources:
      - path: OpenCodeMac/ShikiThemes
      - path: OpenCodeMac/Assets.xcassets
    info:
      path: OpenCodeMac/Info.plist
      properties:
        CFBundleDisplayName: OpenCode
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: Copyright 2026
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    sources:
      - path: OpenCodeKit
      - path: OpenCodePersistence
      - path: OpenCodeFeature
      - path: OpenCodeMac
        excludes:
          - PanePersistenceStore.swift
          - SessionStore.swift
    dependencies:
      - package: Textual
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SWIFT_EMIT_LOC_STRINGS: NO
    scheme:
      testTargets:
        - OpenCodeTests
  OpenCodeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OpenCodeTests
    dependencies:
      - target: OpenCode
      - package: Textual
    settings:
      base:
        PRODUCT_NAME: OpenCodeTests
        PRODUCT_MODULE_NAME: OpenCodeTests
