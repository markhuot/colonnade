name: OpenCodeMac
options:
  bundleIdPrefix: ai.opencode
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 15.0
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: ai.opencode.mac
    PRODUCT_NAME: OpenCodeMac
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    INFOPLIST_KEY_CFBundleDisplayName: OpenCodeMac
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
    INFOPLIST_KEY_NSHumanReadableCopyright: Copyright 2026
targets:
  OpenCodeMac:
    type: application
    platform: macOS
    sources:
      - path: OpenCodeMac
        excludes:
          - PanePersistenceStore.swift
          - SessionStore.swift
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SWIFT_EMIT_LOC_STRINGS: NO
    scheme:
      testTargets:
        - OpenCodeMacTests
  OpenCodeMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OpenCodeMacTests
    dependencies:
      - target: OpenCodeMac
    settings:
      base:
        PRODUCT_NAME: OpenCodeMacTests
        PRODUCT_MODULE_NAME: OpenCodeMacTests
